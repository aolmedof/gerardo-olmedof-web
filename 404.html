<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found | Gerardo O. Flores</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a192f;
      color: #e6f1ff;
      font-family: 'Source Sans Pro', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 6rem; color: #d4a855; font-weight: 700; line-height: 1; }
    p  { color: #8892b0; margin: 16px 0 32px; font-size: 1.1rem; }
    a  {
      color: #d4a855;
      text-decoration: none;
      border: 1.5px solid #d4a855;
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 600;
      transition: background 0.3s;
    }
    a:hover { background: rgba(212, 168, 85, 0.1); }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>Page not found.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
